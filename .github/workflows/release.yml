name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Default GITHUB_TOKEN is sufficient because the publish job lives in this same
    # workflow, gated on the release output — no cross-workflow trigger (and thus
    # no PAT) is required.
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ github.token }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      # Required for npm provenance + token-less OIDC trusted publishing.
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # Publishing reaches npm + the sigstore provenance endpoints; audit
          # (not block) avoids brittle allowlist drift on the signing chain.
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Setup Node (for npm publish --provenance)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # npm trusted publishing (token-less OIDC) requires npm >= 11.5.1, newer
      # than the version bundled with Node 22.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          CI: "true"

      # No NODE_AUTH_TOKEN: the npm trusted-publisher binding for @nimbus-dev/sdk
      # authenticates this workflow via GitHub OIDC and attaches provenance.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
