name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            bun.sh:443

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Build before Test: the declaration-map meta-check asserts dist output.
      - name: Build
        run: bun run build

      # The published ESM entry points must load under plain Node, not just Bun.
      # tsconfig uses moduleResolution: bundler, under which extensionless relative
      # specifiers typecheck cleanly and tsc emits them verbatim — producing a dist/
      # that Node ESM rejects with ERR_MODULE_NOT_FOUND. That shipped undetected
      # because every consumer reached the package through the `bun` export condition
      # or a bundler. Bun resolves those specifiers happily, so this step must run on
      # Node to have any value.
      - name: Node ESM smoke (every exports entry)
        run: |
          node --input-type=module -e "
            const entries = ['./dist/index.js', './dist/ipc/index.js', './dist/testing/index.js'];
            let bad = 0;
            for (const e of entries) {
              try { await import(e); console.log('ok   ' + e); }
              catch (err) { bad++; console.error('FAIL ' + e + ' — ' + err.code); }
            }
            if (bad > 0) process.exit(1);
          "

      - name: Test
        run: bun run test
        env:
          CI: "true"
