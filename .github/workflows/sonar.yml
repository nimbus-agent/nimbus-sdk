name: SonarQube Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarQube Cloud analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # SONAR_TOKEN is optional: the analysis step is skipped when it's absent, so
    # the check passes until the project is imported into SonarCloud and the
    # secret is set. Once configured, the scan waits on the quality gate and
    # fails the check on a gate ERROR (sonar.qualitygate.wait=true).
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            bun.sh:443
            sonarcloud.io:443
            api.sonarcloud.io:443
            scanner.sonarcloud.io:443
            binaries.sonarsource.com:443
            keyserver.ubuntu.com:443
            keys.openpgp.org:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so SonarCloud can attribute new-code via blame.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Coverage (lcov for Sonar)
        run: bun run test:coverage
        env:
          CI: "true"

      - name: SonarQube Cloud analysis
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
