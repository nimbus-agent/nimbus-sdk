name: Feature request
description: Suggest an improvement to @nimbus-dev/sdk
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the connector/extension-authoring use case or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API or helper would you like the SDK to expose? (Remember the dependency-free constraint.)
    validations:
      required: false
