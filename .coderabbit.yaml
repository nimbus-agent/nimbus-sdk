# CodeRabbit configuration — https://docs.coderabbit.ai/configure/
# The CodeRabbit GitHub App must have access to this repository (org-level
# install on nimbus-agent, or add nimbus-sdk to the app's repo list).
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!dist/**"
  path_instructions:
    - path: "src/**/*.ts"
      instructions: >-
        This is @nimbus-dev/sdk — the MIT-licensed, DEPENDENCY-FREE authoring
        contract that Nimbus MCP connectors/extensions compile against. Flag: any
        `any` (prefer `unknown` + a type guard); any `console.*` in non-test src
        (it's a published library); any new runtime dependency added to
        package.json (the package MUST stay dependency-free — inline helpers
        instead); any filesystem / network / env access (the SDK does no I/O and
        holds no secrets); and any change to an exported type that isn't reflected
        as a semver-relevant change (Conventional Commits drive release-please).
chat:
  auto_reply: true
