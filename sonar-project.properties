# SonarQube Cloud (SonarCloud) configuration for nimbus-sdk.
# Project must be imported into the `nimbus-agent` SonarCloud org and a
# SONAR_TOKEN repo/org secret set; the sonar.yml workflow skips analysis when
# the token is absent.

sonar.organization=nimbus-agent
sonar.projectKey=nimbus-agent_nimbus-sdk
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# Tests live alongside source in src/ (**/*.test.ts).
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts

sonar.exclusions=**/node_modules/**,**/dist/**,**/*.d.ts

# bun test --coverage --coverage-reporter=lcov writes coverage/lcov.info.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.typescript.tsconfigPaths=tsconfig.json

# Block CI on the Quality Gate verdict (the scan action waits + exits non-zero
# on gate ERROR). Uses the built-in "Sonar way" gate.
sonar.qualitygate.wait=true
